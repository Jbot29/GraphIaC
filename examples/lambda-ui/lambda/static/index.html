<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mini ui</title>
<style>
  body { margin:0; min-height:100vh; background:#f7f2e6; color:#22304a;
         font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
         display:grid; place-items:center; }
  main { width:min(520px, 92vw); border:2px solid #22304a; background:#fbf8ef;
         box-shadow:3px 3px 0 rgba(34,48,74,0.18); padding:24px; }
  h1 { font-size:16px; margin:0 0 4px; }
  .sub { font-size:12px; color:rgba(34,48,74,0.6); margin:0 0 16px; }
  .row { display:flex; gap:8px; margin-bottom:12px; }
  button { font:inherit; padding:8px 14px; cursor:pointer;
           background:#22304a; color:#f7f2e6; border:2px solid #22304a; }
  button:hover { background:#3d7fa6; border-color:#3d7fa6; }
  input { font:inherit; flex:1; padding:8px; border:2px solid #22304a; background:#fff; }
  pre { background:#efe7d3; border:2px dashed #1f7a6d; padding:12px;
        font-size:12px; white-space:pre-wrap; min-height:3em; margin:0 0 12px; }
  a { color:#c8451f; font-size:12px; }
</style>
</head>
<body>
<main>
  <h1>mini ui</h1>
  <p class="sub">one lambda · logged in · serverless</p>
  <div class="row">
    <button id="now">call /api/now</button>
  </div>
  <div class="row">
    <input id="msg" placeholder="anything…">
    <button id="echo">call /api/echo</button>
  </div>
  <pre id="out">(responses land here)</pre>
  <a href="/logout">sign out</a>
</main>
<script src="/app.js"></script>
</body>
</html>
